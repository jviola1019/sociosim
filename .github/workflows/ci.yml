name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with dev extras)
        run: pip install -e .[dev]
      - name: Lint (ruff)
        run: ruff check socio_sim tests run.py
      - name: Tests (pytest)
        run: pytest -q
