name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  # Manual re-run against any ref, e.g. to prove an exact release SHA.
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned by full commit SHA (supply chain): a
      # moving tag like @v4 can be retargeted; a commit SHA cannot.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install (with dev, e2e, security, asset extras)
        run: |
          # Apply security updates to the build toolchain first: the runner
          # ships setuptools/pip versions that pip-audit flags for freshly
          # published advisories (build tooling, not a socio_sim runtime dep).
          python -m pip install --upgrade pip setuptools
          pip install -e .[dev,e2e,security,asset]
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
      - name: Lint (ruff)
        run: ruff check socio_sim tests run.py scripts examples
      - name: Evidence and claim gates
        run: |
          python scripts/evidence_gate.py
          python scripts/claim_scan.py
          python scripts/secret_scan.py
          python scripts/numeric_provenance_scan.py
      - name: Tests (pytest + coverage gate)
        run: pytest -q --cov=socio_sim --cov-report=term-missing --cov-fail-under=85
      - name: E2E browser smoke (Playwright)
        run: pytest -q tests/test_e2e_playwright.py
      - name: Accessibility gate (axe-core, serious/critical = fail)
        run: pytest -q tests/test_a11y_axe.py
      - name: Asset QA
        run: python scripts/asset_qa.py
      - name: Security scans
        run: |
          bandit -q -r socio_sim -ll
          pip-audit --skip-editable
      - name: License inventory
        run: python scripts/license_inventory.py
      - name: Build wheel + deep wheel QA
        run: |
          python -m build --wheel
          python scripts/wheel_qa.py
      - name: Installed-wheel smoke (clean venv)
        run: |
          python -m venv /tmp/wheel_env
          /tmp/wheel_env/bin/pip -q install dist/*.whl
          /tmp/wheel_env/bin/python - <<'PY'
          import tempfile
          from socio_sim.config import RunConfig
          from socio_sim.pipeline import run_and_analyze
          cfg = RunConfig.test(n_agents=50, n_ticks=6, out_dir=tempfile.mkdtemp())
          a = run_and_analyze(cfg, verify_replay=True)
          assert a.summary and a.replay["ok"]
          print("installed wheel smoke OK")
          PY
