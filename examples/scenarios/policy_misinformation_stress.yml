scenario_id: policy_misinformation_stress
version: "1.0"
lab_mode: society_policy
purpose: Stress elevated misinformation prevalence and adversarial amplification.
intended_use:
  - Explore modeled content-labeling and downranking behavior under stress.
prohibited_use:
  - Do not forecast misinformation prevalence on any real platform.
primary_question: Within this configured synthetic model, how does an elevated misinformation assumption affect exposure?
primary_metric: harmful_exposure_rate
secondary_metrics:
  - moderation_recall
  - ad_disclosure_rate
  - welfare_mean
assumptions:
  - Misinformation base rate and adversary behavior are synthetic assumptions.
  - EU misinformation rules are research approximations.
provenance: synthetic_assumption
research_only_notice: Synthetic scenario estimates only; not a real-world forecast.
config:
  profile: test
  jurisdictions: [EU]
  root_seed: 45
  n_agents: 200
  n_ticks: 48
  red_team: [misinfo_amplifier]
  category_base_rates:
    hate: 0.01
    harassment: 0.015
    fraud: 0.008
    misinfo: 0.1
    adult: 0.01
    illegal_goods: 0.003
    self_harm: 0.004
    political: 0.15
    ai_generated: 0.08
