scenario_id: policy_brigading_stress
version: "1.0"
lab_mode: society_policy
purpose: Stress coordinated brigading assumptions against moderation workflow.
intended_use:
  - Examine review and appeal behavior under synthetic coordinated flag pressure.
prohibited_use:
  - Do not use to design evasion or real-world brigading tactics.
primary_question: Within this configured synthetic model, how does brigading pressure change review outcomes?
primary_metric: moderation_recall
secondary_metrics:
  - harmful_exposure_rate
  - appeal_grant_rate
  - welfare_mean
assumptions:
  - Brigading is represented by a fixed synthetic adversary archetype.
  - User-flag escalation is modeled as review intake, not a legal conclusion.
provenance: synthetic_assumption
research_only_notice: Synthetic scenario estimates only; not a real-world forecast.
config:
  profile: test
  jurisdictions: [EU]
  root_seed: 46
  n_agents: 200
  n_ticks: 48
  red_team: [brigading_ring]
